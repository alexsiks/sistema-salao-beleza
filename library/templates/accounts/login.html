{% extends 'base.html' %}
{% block title %}Entrar — Salão de Beleza{% endblock %}
{% block content %}
<div class="flex justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-sm p-8">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-pink-100 mb-3">
          <i class="bi bi-scissors text-primary text-2xl"></i>
        </div>
        <h3 class="text-2xl font-bold text-gray-800">Bem-vindo(a)</h3>
        <p class="text-gray-500 text-sm mt-1">Acesse sua conta para agendar</p>
      </div>
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Usuário ou e-mail</label>
          <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within:border-primary focus-within:ring-2 focus-within:ring-pink-100">
            <span class="px-3 text-gray-400"><i class="bi bi-person"></i></span>
            <input type="text" name="username" placeholder="Seu usuário ou e-mail" required autocomplete="username"
                   class="flex-1 py-2.5 pr-3 outline-none text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
          <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within:border-primary focus-within:ring-2 focus-within:ring-pink-100">
            <span class="px-3 text-gray-400"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" placeholder="Sua senha" required autocomplete="current-password"
                   class="flex-1 py-2.5 pr-3 outline-none text-sm">
          </div>
        </div>
        <button type="submit" class="w-full bg-primary text-white font-semibold py-3 rounded-lg hover:bg-primary-dark transition flex items-center justify-center gap-2">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>
      <hr class="my-5 border-gray-100">
      <p class="text-center text-sm text-gray-500">
        Ainda não tem conta?
        <a href="{% url 'accounts:register' %}" class="text-primary font-semibold hover:underline">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
