{% extends 'base.html' %}
{% block title %}Entrar — Biblioteca{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 mt-4">
      <div class="text-center mb-4">
        <i class="bi bi-book-half display-4" style="color:var(--lib-primary)"></i>
        <h2 class="mt-2 fw-bold">Bem-vindo</h2>
        <p class="text-muted">Acesse sua conta da biblioteca</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Seu usuário" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center mb-0">Ainda não tem conta?
        <a href="{% url 'accounts:register' %}" class="fw-semibold">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
