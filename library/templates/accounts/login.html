{% extends 'base.html' %}
{% block title %}Entrar — Salão de Beleza{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
             style="width:72px;height:72px;background:var(--salon-light);">
          <i class="bi bi-scissors fs-2" style="color:var(--salon-primary)"></i>
        </div>
        <h3 class="fw-bold mb-0">Bem-vindo(a)</h3>
        <p class="text-muted">Acesse sua conta para agendar</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Seu usuário" required autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Sua senha" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-salon w-100 fw-semibold py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>
      <hr class="my-3">
      <p class="text-center mb-0 small">
        Ainda não tem conta?
        <a href="{% url 'accounts:register' %}" style="color:var(--salon-primary);font-weight:600;">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
