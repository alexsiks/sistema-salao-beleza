{% extends 'base.html' %}
{% block title %}Desativar Serviço — {{ service.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4 text-center">
      <div class="mb-3">
        <i class="bi bi-exclamation-triangle-fill display-4 text-warning"></i>
      </div>
      <h4 class="fw-bold mb-2">Desativar Serviço</h4>
      <p class="text-muted mb-4">
        Tem certeza que deseja desativar <strong>{{ service.name }}</strong>?
        O serviço não aparecerá mais para novos agendamentos.
      </p>
      <div class="d-flex gap-3 justify-content-center">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-eye-slash me-2"></i>Sim, Desativar
          </button>
        </form>
        <a href="{% url 'books:list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
